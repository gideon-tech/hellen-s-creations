<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C8553D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A259;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3CC78F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A259;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bgGradient)"/>
  
  <!-- Inner circle accent -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#FFF8F2" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Stylized female artisan figure holding crafts/beads -->
  <!-- Head -->
  <circle cx="32" cy="16" r="4" fill="#FFF8F2"/>
  
  <!-- Body/Torso -->
  <path d="M 32 20 Q 28 24 28 30 L 36 30 Q 36 24 32 20" fill="#FFF8F2"/>
  
  <!-- Left arm holding thread/beads -->
  <g stroke="#FFF8F2" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M 28 22 Q 20 18 16 14"/>
    <!-- Beads on thread -->
    <circle cx="16" cy="14" r="2" fill="#3CC78F"/>
    <circle cx="18" cy="13" r="1.8" fill="#D4A259"/>
    <circle cx="20" cy="12" r="1.8" fill="#3CC78F"/>
  </g>
  
  <!-- Right arm holding craft item -->
  <g stroke="#FFF8F2" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M 36 22 Q 44 18 48 14"/>
    <!-- Craft symbol - small basket/weave pattern -->
    <circle cx="48" cy="14" r="2.5" fill="none" stroke="#D4A259" stroke-width="1"/>
    <line x1="47" y1="14" x2="49" y2="14" stroke="#D4A259" stroke-width="0.8"/>
    <line x1="48" y1="13" x2="48" y2="15" stroke="#D4A259" stroke-width="0.8"/>
  </g>
  
  <!-- Legs -->
  <g stroke="#FFF8F2" stroke-width="1.5" fill="none" stroke-linecap="round">
    <line x1="28" y1="30" x2="28" y2="38"/>
    <line x1="36" y1="30" x2="36" y2="38"/>
    <!-- Feet -->
    <circle cx="28" cy="39" r="1.2" fill="#FFF8F2"/>
    <circle cx="36" cy="39" r="1.2" fill="#FFF8F2"/>
  </g>
  
  <!-- Decorative elements - African-inspired pattern below -->
  <g fill="#FFF8F2" opacity="0.7">
    <!-- Small diamond shapes representing African textile patterns -->
    <g transform="translate(32, 48)">
      <polygon points="0,-4 4,0 0,4 -4,0" fill="#3CC78F"/>
      <polygon points="-8,-4 -4,0 -8,4 -12,0" fill="#D4A259"/>
      <polygon points="8,-4 12,0 8,4 4,0" fill="#D4A259"/>
    </g>
  </g>
  
  <!-- Highlight for depth -->
  <circle cx="32" cy="32" r="32" fill="none" stroke="#FFF8F2" stroke-width="0.5" opacity="0.2"/>
</svg>
