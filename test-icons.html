<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Icon Test</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; padding: 40px; }
    .icon-wrap {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #C8553D, #A8412D);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 20px auto;
    }
    .icon-wrap svg {
      width: 28px;
      height: 28px;
      color: #fff;
      stroke: #fff;
      stroke-width: 2;
    }
    h2 { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }
  </style>
</head>
<body>
  <h1>Lucide Icon Test</h1>
  
  <h2>Skills Training</h2>
  <div class="icon-wrap"><i data-lucide="book-open"></i></div>
  
  <h2>Market Access</h2>
  <div class="icon-wrap"><i data-lucide="globe"></i></div>
  
  <h2>NGO Partnerships</h2>
  <div class="icon-wrap"><i data-lucide="handshake"></i></div>

  <script src="https://cdn.jsdelivr.net/npm/lucide@latest"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
